<title>FX Impact on Profit Calculator</title>

</head>
<body>

<h1>FX Impact on Profit Calculator</h1>

<input id="a" placeholder="Amount / Price">
<input id="b" placeholder="Rate / Cost">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let revenue=+a.value||0;let fx=+b.value||0;res.innerText='$'+(revenue-fx).toFixed(2);} 
</script>

</body>
