<!DOCTYPE html>
<html>
<head>
<title>Multi-Currency Pricing Calculator</title>
<meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Multi-Currency Pricing Calculator</h1>

<input id="a" placeholder="Amount / Price">
<input id="b" placeholder="Rate / Cost">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let price=+a.value||0;let rate=+b.value||1;res.innerText='$'+(price*rate).toFixed(2);} 
</script>

</body>
</html>
